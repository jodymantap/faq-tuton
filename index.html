<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAQ</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #f8fafc, #e2e8f0);
        }

        /* Smooth accordion real animation */
        .faq-content {
            height: 0;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Icon rotate */
        .icon {
            transition: transform 0.3s ease;
        }

        .faq-item.active .icon {
            transform: rotate(180deg);
        }

        /* subtle entrance */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #modalImg {
            touch-action: none;
            transform-origin: center center;
        }
    </style>
</head>

<body class="min-h-screen text-gray-800">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 py-8 md:py-12">

        <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-6 md:mb-10 tracking-tight leading-tight">
            Frequently Asked Questions
        </h1>

        <div id="faqContainer" class="space-y-3"></div>

    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 backdrop-blur-sm">

        <img id="modalImg" class="max-w-[92%] max-h-[92%] rounded-xl shadow-2xl transition-all duration-300 scale-95" />

    </div>

    <script>
        async function loadFAQ() {
            const res = await fetch('faq.json');
            const data = await res.json();

            const container = document.getElementById('faqContainer');

            data.forEach(item => {
                const el = document.createElement('div');

                el.className = "faq-item fade-in";

                el.innerHTML = `
        <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-gray-200 p-1 sm:p-0
                    hover:shadow-lg transition-all duration-300">

            <button onclick="toggleFAQ(this)"
                class="w-full flex justify-between items-center p-4 sm:p-5 text-left gap-4">

                <span class="font-medium text-[15px] sm:text-base md:text-lg leading-snug">
                    ${item.question}
                </span>

                <svg class="icon w-5 h-5 text-gray-500"
                    fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7"/>
                </svg>
            </button>

            <div class="faq-content px-4 sm:px-5">

                <div class="pb-5 pt-3 border-t border-gray-100">

                    <p class="text-gray-600 mb-4 leading-relaxed text-[14px] sm:text-sm md:text-base">
                        ${item.answer}
                    </p>

                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4">
                        ${item.images.map(img => `
                            <img src="${img}"
                            class="rounded-xl cursor-pointer object-cover h-32 sm:h-36 md:h-40 w-full
                                   hover:scale-[1.03] hover:shadow-md transition duration-300"
                            onclick="openModal('${img}')"
                            />
                        `).join('')}
                    </div>

                </div>

            </div>
        </div>
        `;

                container.appendChild(el);
            });
        }

        function toggleFAQ(button) {
            const item = button.closest('.faq-item');
            const content = item.querySelector('.faq-content');

            const isOpen = item.classList.contains('active');

            // close all first (single open mode)
            document.querySelectorAll('.faq-item').forEach(i => {
                i.classList.remove('active');
                const c = i.querySelector('.faq-content');
                c.style.height = "0px";
            });

            if (!isOpen) {
                item.classList.add('active');

                // calculate real height
                content.style.height = content.scrollHeight + "px";
            }
        }

        function openModal(src) {
            const modal = document.getElementById('modal');
            const img = document.getElementById('modalImg');

            img.src = src;
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {
                img.classList.remove('scale-95');
                img.classList.add('scale-100');
            }, 10);
        }

        document.getElementById('modal').onclick = function (e) {
            if (e.target.id !== 'modal') return; // ⬅️ penting

            const img = document.getElementById('modalImg');
            img.classList.add('scale-95');

            setTimeout(() => {
                this.classList.add('hidden');
            }, 150);
        };

        loadFAQ();

        /* ================= ZOOM IMAGE (MODAL ONLY) ================= */

        let scale = 1;
        let baseScale = 1;
        let posX = 0;
        let posY = 0;
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let startDist = 0;
        let tapTimeout = null;

        const modalImg = document.getElementById('modalImg');

        /* ---------- TRANSFORM ---------- */
        function updateTransform(originX = null, originY = null) {
            if (originX !== null && originY !== null) {
                modalImg.style.transformOrigin = `${originX}px ${originY}px`;
            }
            modalImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        /* ---------- STOP BUBBLE (PENTING) ---------- */
        modalImg.addEventListener('click', (e) => e.stopPropagation());
        modalImg.addEventListener('touchend', (e) => e.stopPropagation());

        /* ---------- PINCH ZOOM (SMOOTH) ---------- */
        function getDistance(touches) {
            return Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
        }

        modalImg.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                startDist = getDistance(e.touches);
                baseScale = scale; // anchor scale biar ga geter
            }
        }, { passive: false });

        modalImg.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();

                const newDist = getDistance(e.touches);
                const zoomFactor = newDist / startDist;

                scale = Math.min(Math.max(1, baseScale * zoomFactor), 4);

                const rect = modalImg.getBoundingClientRect();
                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

                updateTransform(centerX, centerY);
            }
        }, { passive: false });

        /* ---------- DOUBLE TAP (FIXED) ---------- */
        modalImg.addEventListener('touchend', (e) => {
            if (e.touches.length > 0) return;

            if (tapTimeout) {
                clearTimeout(tapTimeout);
                tapTimeout = null;

                // toggle zoom
                scale = scale > 1 ? 1 : 2;

                const rect = modalImg.getBoundingClientRect();
                const touch = e.changedTouches[0];

                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                posX = 0;
                posY = 0;

                updateTransform(x, y);
            } else {
                tapTimeout = setTimeout(() => {
                    tapTimeout = null;
                }, 250);
            }
        });

        /* ---------- DOUBLE CLICK (DESKTOP) ---------- */
        modalImg.addEventListener('dblclick', (e) => {
            scale = scale > 1 ? 1 : 2;

            const rect = modalImg.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            posX = 0;
            posY = 0;

            updateTransform(x, y);
        });

        /* ---------- DRAG (DESKTOP) ---------- */
        modalImg.addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        /* ---------- RESET SAAT OPEN MODAL ---------- */
        const originalOpenModal = openModal;

        openModal = function (src) {
            originalOpenModal(src);

            scale = 1;
            baseScale = 1;
            posX = 0;
            posY = 0;

            modalImg.style.transformOrigin = "center center";
            modalImg.style.transform = "translate(0px, 0px) scale(1)";
        };
    </script>

</body>

</html>
